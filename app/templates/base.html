<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Nudgemate{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e10; --surface: #18181b; --surface2: #27272a;
      --border: #3f3f46; --text: #fafafa; --muted: #a1a1aa;
      --accent: #a3e635; --accent-dim: #3f6212; --red: #f87171;
      --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    .nav { border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .nav-logo { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-links a { font-size: 13px; color: var(--muted); transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); }
    .container { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: var(--sans); }
    .btn-primary { background: var(--accent); color: #0e0e10; }
    .btn-primary:hover { background: #bef264; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid transparent; }
    .btn-danger:hover { border-color: var(--red); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
    .input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-size: 14px; font-family: var(--sans); outline: none; transition: border-color 0.15s; }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--muted); }
    .label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; font-family: var(--mono); }
    .badge-green { background: var(--accent-dim); color: var(--accent); }
    .badge-gray { background: var(--surface2); color: var(--muted); }
    .badge-red { background: #450a0a; color: var(--red); }
    .flash { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; }
    .flash-error { background: #450a0a; color: var(--red); border: 1px solid #7f1d1d; }
    .flash-success { background: var(--accent-dim); color: var(--accent); border: 1px solid #4d7c0f; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; }
    .page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
    {% block styles %}{% endblock %}
  </style>
</head>
<body>
  {% if current_user %}
  <nav class="nav">
    <span class="nav-logo">nudgemate</span>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/settings">Settings</a>
      <a href="/auth/logout">Logout</a>
    </div>
  </nav>
  {% endif %}
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
