<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #18181b; padding: 28px 32px; }
    .header h1 { color: #ffffff; margin: 0; font-size: 20px; font-weight: 600; }
    .header p { color: #a1a1aa; margin: 4px 0 0; font-size: 13px; }
    .body { padding: 32px; }
    .product-name { font-size: 16px; font-weight: 600; color: #18181b; margin: 0 0 20px; line-height: 1.4; }
    .price-row { display: flex; gap: 16px; margin-bottom: 28px; }
    .price-box { flex: 1; background: #f4f4f5; border-radius: 8px; padding: 16px; text-align: center; }
    .price-box.highlight { background: #f0fdf4; border: 1.5px solid #86efac; }
    .price-box .label { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .price-box .amount { font-size: 24px; font-weight: 700; color: #18181b; }
    .price-box.highlight .amount { color: #16a34a; }
    .cta { display: block; background: #18181b; color: #ffffff; text-decoration: none; text-align: center; padding: 14px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; margin-bottom: 24px; }
    .footer { padding: 20px 32px; border-top: 1px solid #f4f4f5; font-size: 12px; color: #a1a1aa; text-align: center; }
    .footer a { color: #71717a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Price Drop Alert 🎯</h1>
      <p>Nudgemate found a deal for you</p>
    </div>
    <div class="body">
      <p class="product-name">{{ product_name }}</p>
      <div class="price-row">
        <div class="price-box"><div class="label">Your Target</div><div class="amount">${{ target_price }}</div></div>
        <div class="price-box highlight"><div class="label">Current Price</div><div class="amount">${{ current_price }}</div></div>
      </div>
      <a class="cta" href="{{ affiliate_url }}">Buy Now on Amazon →</a>
    </div>
    <div class="footer">
      <p>You're tracking this on <a href="https://nudgemate.net">nudgemate.net</a> &nbsp;·&nbsp; <a href="https://nudgemate.net/dashboard">Manage alerts</a></p>
      <p style="margin-top:8px; color:#d4d4d8;">Prices may change. This link may earn a small commission.</p>
    </div>
  </div>
</body>
</html>
